<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QDII-fund-scout</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@200;300;400;500;600;700;800;900&display=swap');
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@200;300;400;500;600;700;900&display=swap');
@import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&display=swap');
</style>
<style>
*,*::before,*::after{box-sizing:border-box}
html,body{margin:0;padding:0;height:100%}

body{
  --bg:#f5f5f7;
  --bg-card:#ffffff;
  --border:rgba(0,0,0,.10);
  --border-focus:rgba(0,113,227,.5);
  --ink:#1d1d1f;
  --ink2:#86868b;
  --ink3:#aeaeb3;
  --accent:#0071e3;
  --accent-hover:#0077ed;
  --green:#1aaf6c;
  --red:#d32f2f;
  --cyan:#0077b6;
  --blue:#0071e3;
  --surface-input:#ffffff;
  --radius:12px;
  --radius-sm:8px;
  --btn-bg:rgba(0,113,227,.08);
  --btn-border:rgba(0,113,227,.25);
  --btn-hover:rgba(0,113,227,.18);
  --warn-bg:rgba(0,113,227,.05);
  --warn-border:rgba(0,113,227,.15);
  --row-hover:rgba(0,0,0,.02);
  --status-pause:var(--red);
  --status-small:#e65100;
  --status-open:var(--green);
  background:var(--bg);
  color:var(--ink);
  font-family:'Inter','Noto Sans SC',-apple-system,BlinkMacSystemFont,Helvetica,Arial,sans-serif;
  -webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale;
}

.container{max-width:1200px;margin:0 auto;padding:20px 20px 48px}
@media(max-width:768px){.container{padding:12px 10px 32px}}

.head{text-align:center;padding:12px 0 8px}
.head h1{font-size:32px;font-weight:700;letter-spacing:-.02em;margin:4px 0 2px;line-height:1.15;color:var(--ink)}
.head .sub{font-size:13px;color:var(--ink2)}
@media(max-width:600px){.head h1{font-size:24px}}

/* cards */
.card{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius);padding:16px 20px;margin-bottom:14px}
.card h3{font-size:14px;font-weight:600;margin:0 0 12px;color:var(--ink)}

/* form */
.fund-row{display:flex;gap:8px;margin-bottom:10px;flex-wrap:wrap}
.fund-row select,.fund-row input{background:var(--surface-input);border:1px solid var(--border);border-radius:var(--radius-sm);color:var(--ink);padding:9px 12px;font-size:14px;font-family:inherit;outline:none;transition:border-color .2s}
.fund-row select:focus,.fund-row input:focus{border-color:var(--border-focus);box-shadow:0 0 0 2px color-mix(in srgb,var(--border-focus) 20%,transparent)}
.fund-row select option{background:var(--bg-card);color:var(--ink)}
.fund-row input::placeholder{color:var(--ink3);opacity:.6}
.fund-row input[type="text"]{flex:1;min-width:0}

/* buttons */
.btn{display:inline-flex;align-items:center;justify-content:center;padding:9px 18px;border:none;border-radius:var(--radius-sm);font-size:14px;font-weight:500;font-family:inherit;cursor:pointer;transition:all .2s;white-space:nowrap;gap:6px}
.btn:active{transform:scale(.97)}
.btn-blue{background:#0071e3;color:#fff}
.btn-blue:hover{background:#0077ed}
.btn-green{background:#1aaf6c;color:#fff}
.btn-green:hover{background:#1dbd76}
.btn-query{background:#7c3aed;color:#fff}
.btn-query:hover{background:#6d28d9}
.btn-sm{padding:5px 12px;font-size:12px}
.btn-small{padding:7px 14px;font-size:13px}
.btn-outline{background:transparent;color:var(--ink2);border:1px solid var(--border)}
.btn-outline:hover{background:rgba(0,0,0,.04);color:var(--ink)}

/* fund list */
.fund-list{margin-top:10px}
.fund-item{display:flex;align-items:center;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--border)}
.fund-item:last-child{border-bottom:none}
.fund-item .code{font-weight:600;font-size:14px;color:var(--accent);font-family:'JetBrains Mono',monospace}
.fund-item .name{font-size:13px;color:var(--ink2);margin-left:12px}
.fund-item .remove-btn{background:none;border:none;color:var(--red);cursor:pointer;font-size:18px;padding:2px 6px;line-height:1;opacity:.5;transition:opacity .2s;border-radius:4px}
.fund-item .remove-btn:hover{opacity:1;background:rgba(211,47,47,.08)}

/* push config */
.push-row{display:flex;gap:8px;margin-bottom:10px;align-items:center;flex-wrap:wrap}
.push-row label{font-size:13px;color:var(--ink2);min-width:60px;font-weight:500}
.push-row input[type="text"]{flex:1;min-width:160px;background:var(--surface-input);border:1px solid var(--border);border-radius:var(--radius-sm);color:var(--ink);padding:9px 12px;font-size:13px;font-family:inherit;outline:none;transition:border-color .2s}
.push-row input[type="text"]:focus{border-color:var(--border-focus);box-shadow:0 0 0 2px color-mix(in srgb,var(--border-focus) 20%,transparent)}
.push-hint{font-size:11px;color:var(--ink3);margin:-4px 0 8px 68px}

/* action bar */
.action-bar{display:flex;gap:10px;flex-wrap:wrap;justify-content:center;margin:16px 0}
.action-bar .btn{padding:11px 24px;font-size:15px;font-weight:600}
@media(max-width:600px){.action-bar .btn{flex:1;text-align:center;font-size:14px;padding:10px 12px}}

/* loading */
.loading{display:none;text-align:center;padding:24px;color:var(--ink2)}
.loading.active{display:block}
.spinner{display:inline-block;width:22px;height:22px;border:2.5px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite;vertical-align:middle;margin-right:10px}
@keyframes spin{to{transform:rotate(360deg)}}

/* warnings */
.warnings{background:var(--warn-bg);border:1px solid var(--warn-border);border-radius:8px;padding:10px 14px;margin-bottom:12px;font-size:13px;display:none}
.warnings.show{display:block}
.warning-item{padding:3px 0;color:var(--ink2)}

/* table */
.table-wrap{overflow-x:auto;margin-bottom:10px;border-radius:var(--radius-sm);border:1px solid var(--border)}
.result-table{width:100%;border-collapse:collapse;font-size:13px;display:none}
.result-table.show{display:table}
.result-table th{padding:8px 10px;text-align:left;font-weight:600;font-size:12px;color:var(--ink2);border-bottom:1px solid var(--border);white-space:nowrap;background:var(--bg)}
.result-table td{padding:8px 10px;border-bottom:1px solid var(--border);white-space:nowrap;font-size:13px}
.result-table tr:last-child td{border-bottom:none}
.result-table tr:hover td{background:var(--row-hover)}
.result-table .num{text-align:right;font-variant-numeric:tabular-nums;font-family:'JetBrains Mono',monospace;font-size:12px}
.result-table .red{color:var(--red);font-weight:500}
.result-table .green{color:var(--green);font-weight:500}
.result-table .status-pause{color:var(--status-pause);font-weight:600}
.result-table .status-limit-small{color:var(--status-small)}
.result-table .status-open{color:var(--status-open);font-weight:500}
.result-table .market-top3{font-size:12px;max-width:260px;overflow:hidden;text-overflow:ellipsis}

/* empty */
.empty-state{text-align:center;padding:24px;color:var(--ink3);font-size:13px}

/* toast */
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--bg-card);color:var(--ink);padding:10px 20px;border-radius:8px;font-size:13px;border:1px solid var(--border);box-shadow:0 4px 16px rgba(0,0,0,.08);opacity:0;transition:opacity .25s;z-index:99999;pointer-events:none}
.toast.show{opacity:1}

/* footer */
.footer{text-align:center;padding:16px 0 8px;font-size:11px;color:var(--ink3);border-top:1px solid var(--border);margin-top:16px;line-height:1.8}
.footer-note{font-size:11px;color:var(--ink3);opacity:.7}

/* responsive */
@media(max-width:600px){
  .fund-row{flex-direction:column}
  .push-row{flex-direction:column;align-items:stretch}
  .push-row label{min-width:auto}
  .push-hint{margin-left:0}
  .result-table{font-size:12px}
  .result-table th,.result-table td{padding:6px 6px}
  .result-table .market-top3{max-width:120px}
}
</style>
</head>

<script>
let currentFunds = [];

async function api(path, body) {
  const res = await fetch(path, {
    method: body ? 'POST' : 'GET',
    headers: body ? {'Content-Type': 'application/json'} : {},
    body: body ? JSON.stringify(body) : undefined,
  });
  return res.json();
}

function toast(msg, duration) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(el._timer);
  el._timer = setTimeout(() => el.classList.remove('show'), duration || 2200);
}

function onPresetChange() {
  const sel = document.getElementById('presetFund');
  if (!sel.value) return;
  const parts = sel.value.split('|');
  document.getElementById('manualCode').value = parts[0];
  document.getElementById('manualName').value = parts[1];
}

async function addFund() {
  const code = document.getElementById('manualCode').value.trim();
  const name = document.getElementById('manualName').value.trim();
  const sel = document.getElementById('presetFund');
  if (!code) { toast('请输入基金代码'); return; }
  if (currentFunds.some(f => f.code === code)) { toast('该基金已在列表中'); return; }
  currentFunds.push({code, name: name || code});
  document.getElementById('manualCode').value = '';
  document.getElementById('manualName').value = '';
  sel.value = '';
  renderFunds();
  await saveFunds();
}

async function removeFund(index) {
  currentFunds.splice(index, 1);
  renderFunds();
  await saveFunds();
}

function renderFunds() {
  const container = document.getElementById('fundList');
  if (currentFunds.length === 0) {
    container.innerHTML = '<div class="empty-state">还未添加基金，从下拉选择或输入代码后点击添加</div>';
    return;
  }
  container.innerHTML = currentFunds.map((f, i) =>
    `<div class="fund-item">
      <div>
        <span class="code">${f.code}</span>
        <span class="name">${f.name}</span>
      </div>
      <button class="remove-btn" onclick="removeFund(${i})">&times;</button>
    </div>`
  ).join('');
}

async function saveFunds() {
  await api('/api/config', {my_funds: currentFunds});
}

function onSchedulePresetChange() {
  const sel = document.getElementById('schedulePreset');
  const customRow = document.getElementById('customTimeRow');
  if (sel.value === 'custom') {
    customRow.style.display = 'flex';
  } else {
    customRow.style.display = 'none';
  }
}

async function setupSchedule() {
   const sel = document.getElementById('schedulePreset');
   let val = sel.value;
   if (!val) { toast('请选择推送时段'); return; }
   let times, weekdays;
   if (val === 'custom') {
     const timeStr = document.getElementById('customTime').value.trim();
     weekdays = document.getElementById('customDayType').value;
     if (!timeStr) { toast('请输入推送时间'); return; }
     times = timeStr;
   } else {
     const [t, d] = val.split('|');
     times = t;
     weekdays = d;
   }
   const result = await api('/api/schedule', {action: 'setup', times, weekdays});
   if (result.ok) toast('定时推送已启用');
   else toast('启用失败: ' + (result.error || ''));
   await loadScheduleStatus();
 }

async function removeSchedule() {
  const result = await api('/api/schedule', {action: 'remove'});
  if (result.ok) toast('定时推送已取消');
  else toast('取消失败: ' + (result.error || ''));
  await loadScheduleStatus();
}

async function loadScheduleStatus() {
   const data = await api('/api/schedule');
   const el = document.getElementById('scheduleStatus');
   if (data.active) {
     let desc = '';
     if (data.times && data.times.length > 0) {
       const dayLabel = data.weekdays ? '工作日' : '每天';
       desc = `${dayLabel} ${data.times.join(', ')}`;
     } else if (data.cron) {
       desc = data.cron;
     }
     el.innerHTML = `<span style="color:var(--green);font-weight:500">已启用</span> ${desc ? '— ' + desc : ''}`;
   } else {
     el.textContent = '未启用定时推送';
   }
 }

async function loadConfig() {
  const data = await api('/api/config');
  currentFunds = data.my_funds || [];
  renderFunds();
  const push = data.push || {};
  document.getElementById('feishuUrl').value = push.feishu_webhook || '';
  document.getElementById('wechatUrl').value = push.wechat_webhook || '';
  await loadScheduleStatus();
}

async function saveConfig() {
  const feishuUrl = document.getElementById('feishuUrl').value.trim();
  const wechatUrl = document.getElementById('wechatUrl').value.trim();
  await api('/api/config', {
    my_funds: currentFunds,
    push: { feishu_webhook: feishuUrl, wechat_webhook: wechatUrl }
  });
  toast('配置已保存');
}

async function testWebhook(type) {
  const url = document.getElementById(type === 'feishu' ? 'feishuUrl' : 'wechatUrl').value.trim();
  if (!url) { toast('请先输入 Webhook 地址'); return; }
  const btn = event.target;
  btn.textContent = '...';
  btn.disabled = true;
  const result = await api('/api/test-webhook', {type, url});
  btn.textContent = '测试';
  btn.disabled = false;
  toast(result.ok ? (type === 'feishu' ? '飞书连接成功' : '企业微信连接成功') : (result.error || '连接失败'));
}

async function runQuery(pushTarget) {
  const codes = currentFunds.map(f => f.code);
  if (codes.length === 0) { toast('请先添加基金'); return; }
  document.getElementById('loading').classList.add('active');
  document.getElementById('resultTable').classList.remove('show');
  document.getElementById('emptyResult').style.display = 'none';
  document.getElementById('warnings').classList.remove('show');
  document.getElementById('warnings').innerHTML = '';
  if (pushTarget) await saveConfig();
  try {
    const data = await api('/api/query', {codes});
    renderResult(data);
    if (pushTarget) {
      document.getElementById('loading').classList.add('active');
      document.querySelector('#loading span').textContent = '正在推送...';
      await pushAfterQuery(pushTarget, codes);
    }
    document.getElementById('loading').classList.remove('active');
  } catch (e) {
    document.getElementById('loading').classList.remove('active');
    toast('失败: ' + e.message);
  }
}

function fmtReturn(val) {
  if (val === null || val === undefined || val === '') return '-';
  const v = typeof val === 'string' ? parseFloat(val.replace('%','')) : val;
  if (isNaN(v)) return '-';
  const sign = v > 0 ? '+' : '';
  return `<span class="${v > 0 ? 'red' : (v < 0 ? 'green' : '')}">${sign}${v.toFixed(2)}%</span>`;
}

function fmtDrawdown(val) {
  if (val === null || val === undefined || val === '') return '-';
  const v = typeof val === 'string' ? parseFloat(val) : val;
  if (isNaN(v)) return '-';
  return `<span>${(v * 100).toFixed(2)}%</span>`;
}

function fmtFee(val) {
  if (val === null || val === undefined || val === '') return '-';
  const v = typeof val === 'string' ? parseFloat(val) : val;
  if (isNaN(v)) return '-';
  return v.toFixed(2) + '%';
}

function fmtStatus(info) {
  if (!info) return '-';
  if (info.includes('暂停')) return '<span class="status-pause">' + info + '</span>';
  if (info.includes('限小额')) return '<span class="status-limit-small">' + info + '</span>';
  if (info.includes('限大额')) return '<span class="status-limit-small">' + info + '</span>';
  if (info.includes('开放')) return '<span class="status-open">' + info + '</span>';
  return info;
}

function renderResult(data) {
  document.getElementById('loading').classList.remove('active');
  if (data.warnings && data.warnings.length > 0) {
    const el = document.getElementById('warnings');
    el.innerHTML = data.warnings.map(w => `<div class="warning-item">${w}</div>`).join('');
    el.classList.add('show');
  }
  const funds = data.funds || [];
  if (funds.length === 0) {
    document.getElementById('emptyResult').style.display = 'block';
    return;
  }
  const tbody = document.getElementById('resultBody');
  tbody.innerHTML = funds.map(f => {
    const crossHtml = '';
    return `<tr>
        <td><strong>${f.name}</strong></td>
        <td style="color:var(--accent);font-family:'JetBrains Mono',monospace">${f.code}</td>
        <td class="num">${fmtReturn(f.return_1y)}</td>
        <td class="num">${fmtDrawdown(f.drawdown_1y)}</td>
        <td class="num">${f.scale || '-'}</td>
        <td class="num">${fmtFee(f.total_fee)}</td>
        <td>${fmtStatus(f.purchase_info || '')}</td>
        <td class="market-top3">${f.market_top3 || '-'}</td>
      </tr>`;
  }).join('');
  document.getElementById('resultTable').classList.add('show');
}

async function pushAfterQuery(target, codes) {
  const res = await api('/api/push', {target, codes});
  if (res.ok) toast('已推送到' + (target === 'feishu' ? '飞书' : '企业微信'));
  else toast('推送失败: ' + (res.error || ''));
}

loadConfig();
</script>
